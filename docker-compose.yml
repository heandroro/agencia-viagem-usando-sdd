version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: agencia-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agencia_viagem
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/internal/infra/database/migrations:/docker-entrypoint-initdb.d
    networks:
      - agencia-network

  valkey:
    image: valkey/valkey:7.2
    container_name: agencia-valkey
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    networks:
      - agencia-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agencia-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DATABASE=agencia_viagem
      - POSTGRES_SSLMODE=disable
      - VALKEY_ADDR=valkey:6379
      - ENCRYPTION_KEY=default-key-change-in-production-32b!
      - JWT_SECRET=default-jwt-secret-change-in-production
      - APM_ENABLED=true
      - APM_SERVICE_NAME=reservation-service
      - APM_ENVIRONMENT=development
    depends_on:
      - postgres
      - valkey
    networks:
      - agencia-network

  bff:
    build:
      context: ./bff
      dockerfile: Dockerfile
    container_name: agencia-bff
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - BACKEND_URL=http://backend:8080
      - VALKEY_URL=redis://valkey:6379/0
      - JWT_SECRET=default-jwt-secret-change-in-production
    depends_on:
      - backend
      - valkey
    networks:
      - agencia-network

volumes:
  postgres_data:
  valkey_data:

networks:
  agencia-network:
    driver: bridge
