version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: agencia-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: agencia_viagem
    volumes:
      - mongodb_data:/data/db
    networks:
      - agencia-network

  valkey:
    image: valkey/valkey:7.2
    container_name: agencia-valkey
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    networks:
      - agencia-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agencia-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - MONGODB_URI=mongodb://admin:admin123@mongodb:27017/agencia_viagem?authSource=admin
      - MONGODB_DATABASE=agencia_viagem
      - VALKEY_ADDR=valkey:6379
      - ENCRYPTION_KEY=default-key-change-in-production-32b!
      - JWT_SECRET=default-jwt-secret-change-in-production
      - APM_ENABLED=true
      - APM_SERVICE_NAME=reservation-service
      - APM_ENVIRONMENT=development
    depends_on:
      - mongodb
      - valkey
    networks:
      - agencia-network

  bff:
    build:
      context: ./bff
      dockerfile: Dockerfile
    container_name: agencia-bff
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - BACKEND_URL=http://backend:8080
      - VALKEY_URL=redis://valkey:6379/0
      - JWT_SECRET=default-jwt-secret-change-in-production
    depends_on:
      - backend
      - valkey
    networks:
      - agencia-network

volumes:
  mongodb_data:
  valkey_data:

networks:
  agencia-network:
    driver: bridge
